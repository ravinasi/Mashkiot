<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>משקיעות | כלים פיננסיים</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">
        <img src="/images/logo.jpg" alt="משקיעות" class="brand-logo">
    </a>
    <nav class="nav">
      <a href="/" class="active">דף ראשי</a>
      <a href="/compound-interest/">ריבית דה ריבית</a>
      <a href="/present-value/" >היוון</a>
    </nav>
  </header>

  <main class="main home-main">
    <section class="hero">
      <h1>מחשבוני משקיעות</h1>
      <p class="hero-text">
        בחרי את המחשבון שתרצי להשתמש בו
      </p>
    </section>

    <section class="cards-grid">
      <article class="tool-card">
        <div class="tool-badge">מחשבון 1</div>
        <h2>מחשבון ריבית דה ריבית</h2>
        <p>
          לחישוב צמיחת השקעה לאורך זמן, כולל הפקדות חודשיות וגרף שנתי.
        </p>
        <a class="primary-btn" href="/compound-interest/">למעבר למחשבון</a>
      </article>

      <article class="tool-card">
        <div class="tool-badge">מחשבון 2</div>
        <h2>מחשבון היוון</h2>
        <p>
          לחישוב הערך הנוכחי של סכום עתידי לפי מספר שנים ומקדם היוון.
        </p>
        <a class="primary-btn" href="/present-value/">למעבר למחשבון</a>
      </article>
    </section>
  </main>
</body>
</html>
